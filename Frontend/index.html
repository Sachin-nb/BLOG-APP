<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Posts | Editorial website</title>
    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --bg-color: #f8f9fc;
            --text-main: #1a2942;
            --text-muted: #5a6c7d;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --border-color: #e2e8f0;
            --card-bg: #ffffff;
            --shadow-sm: 0 2px 8px rgba(26, 41, 66, 0.06);
            --shadow-md: 0 8px 24px rgba(26, 41, 66, 0.12);
            --shadow-lg: 0 16px 40px rgba(26, 41, 66, 0.15);
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
            --max-width: 900px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-gradient);
            color: var(--text-main);
            line-height: 1.6;
            padding: 80px 20px 60px;
            min-height: 100vh;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 100px;
            animation: slideDown 0.8s ease-out;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
            color: var(--text-main);
            background: linear-gradient(135deg, #1a2942 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 600;
            word-spacing: 0.2em;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 48px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            height: 100%;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .post-card:hover {
            transform: translateY(-12px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-color);
        }

        .post-img-container {
            width: 100%;
            height: 320px;
            overflow: hidden;
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            position: relative;
            flex-shrink: 0;
        }

        .post-img-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(59, 130, 246, 0.05));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .post-card:hover .post-img-container::after {
            opacity: 1;
        }

        .post-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .post-card:hover .post-img {
            transform: scale(1.08);
        }

        .post-meta {
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .post-title {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-main);
            margin-bottom: 12px;
            flex-grow: 1;
        }

        .post-excerpt {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
        }

        .post-card > div:not(.post-img-container) {
            padding: 28px 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .read-more {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--accent-color);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            margin-top: auto;
        }

        .read-more::after {
            content: '→';
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .post-card:hover .read-more {
            color: var(--accent-hover);
        }

        .post-card:hover .read-more::after {
            transform: translateX(6px);
        }

        .loading {
            text-align: center;
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1.3rem;
            color: var(--text-muted);
            padding: 140px 0;
            animation: fadeIn 0.6s ease-out;
        }

        .error {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #991b1b;
            padding: 32px 28px;
            border-radius: 12px;
            border: 1px solid #fca5a5;
            text-align: center;
            box-shadow: 0 4px 12px rgba(127, 29, 29, 0.1);
            font-weight: 500;
        }

        @media (max-width: 768px) {
            h1 { 
                font-size: 2.8rem; 
            }
            
            .posts-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .post-title { 
                font-size: 1.6rem; 
            }
            
            .post-img-container { 
                height: 260px; 
            }
            
            body { 
                padding: 60px 15px 40px; 
            }
            
            header {
                margin-bottom: 60px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="subtitle">The Daily Journal</div>
            <h1>Editorial Postings</h1>
        </header>

        <main id="posts-container" class="posts-grid">
            <div class="loading">Fetching the latest stories...</div>
        </main>
    </div>

    <script>
        async function loadPosts() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts');
                let posts = await response.json();
                posts = posts.slice(0, 20);

                const container = document.getElementById('posts-container');
                container.innerHTML = '';

                posts.forEach((post, index) => {
                    const postLink = document.createElement('a');
                    postLink.className = 'post-card';
                    postLink.href = `post-detail.html?id=${post.id}`;
                    // Staggered animation delay (max 2s limit for very long lists)
                    const delay = Math.min(index * 0.1, 2);
                    postLink.style.animationDelay = `${delay}s`;
                    
                    const imageUrl = `https://picsum.photos/900/600?random=${post.id}`;
                    
                    postLink.innerHTML = `
                        <div class="post-img-container">
                            <img class="post-img" src="${imageUrl}" alt="${post.title}" loading="lazy">
                        </div>
                        <div class="post-meta">Story ID: ${post.id} • Author ${post.userId}</div>
                        <h2 class="post-title">${post.title}</h2>
                        <p class="post-excerpt">${post.body}</p>
                        <div class="read-more">Read Full Story</div>
                    `;
                    container.appendChild(postLink);
                });
            } catch (error) {
                document.getElementById('posts-container').innerHTML = `
                    <div class="error">
                        <strong>Unable to load stories.</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        }

        loadPosts();
    </script>
</body>

</html>
